<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Navbar -->
        <nav>
            <div class="logo">Portfolio</div>

            <ul class="menu">
                <li><a href="#">About</a></li>
                <li><a href="#">Project</a></li>
                <li><a href="#">Skills</a></li>
                <li><a href="#">Contact</a></li>
                </ul>

            <button class="hire">Hire Me</button>
        </nav>

         <!-- Contact -->
       <section id="contact" class="contact">

            <h1>Get in Touch</h1>

            <div class="contact-container">

                <!-- Contact Info -->
                <div class="contact-info">

                    <h3>Contact Information</h3>

                    <div class="info-item">
                        <img src="image/email.jpg" alt="email">
                        <p>salenashrestha18@gmail.com</p>
                    </div>

                    <div class="info-item">
                        <img src="image/location.png" alt="location">
                        <p>Bhaktapur, Nepal</p>
                </div>

                <!-- Social Links -->

                <div class="social">

                    <a href="#">
                        <img src="image/github.jpg" alt="github">
                    </a>

                    <a href="#">
                        <img src="image/linkedin.png" alt="linkedin">
                    </a>

                    <a href="#">
                        <img src="image/fb.png" alt="facebook">
                    </a>

                </div>

            </div>


            <!-- Contact Form -->

            <div class="form-section">

                <h3>Send me message</h3>

                <form id="contactForm">

                    <input type="text" id="name" placeholder="Name">
                    <input type="email" id="email" placeholder="Email">
                    <textarea id="message" placeholder="Message"></textarea>

                    <button>Send Message</button>

                    <p id="error"></p>

                </form>
            </div>

            </div>

        </section>


        <!-- footer -->
        <footer>
        <p>Designed and developed by Salina</p>
        </footer>

    <script src="script.js"></script>
</body>
</html>
